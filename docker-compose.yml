services:
  jarvis_runtime:
    build:
      context: .
      dockerfile: Dockerfile.jarvis_runtime
    container_name: jarvis_runtime
    depends_on:
      - tool_runtime
    shm_size: 512m
    volumes:
      - ./:/repo
      - ${AGENT_ROOT:-${HOME}/.jarvis/workspace}:/workspace
      - uv_cache:/root/.cache/uv
    environment:
      JARVIS_TOOL_RUNTIME_BASE_URL: http://tool_runtime:8081
      JARVIS_TOOL_RUNTIME_TIMEOUT_SECONDS: 45
      JARVIS_TOOL_RUNTIME_HEALTHCHECK_TIMEOUT_SECONDS: 5
      JARVIS_CODEX_HOST_REPO_ROOT: ${PWD}
      JARVIS_CODEX_HOST_WORKSPACE_ROOT: ${AGENT_ROOT:-${HOME}/.jarvis/workspace}
    secrets:
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - GOOGLE_API_KEY
      - XAI_API_KEY
      - OPENROUTER_API_KEY
      - JARVIS_CODEX_WS_BEARER_TOKEN
      - SENDER_EMAIL_ADDRESS
      - SMTP_PASSWORD
      - TELEGRAM_TOKEN
      - JARVIS_UI_TELEGRAM_ALLOWED_USER_ID
      - BRAVE_SEARCH_API_KEY
      - CLOUDFLARE_ACCOUNT_ID
      - CLOUDFLARE_AI_WORKERS_REST_API_KEY
    working_dir: /repo
    command:
      - bash
      - -lc
      - |
        mkdir -p /workspace/identities
        mkdir -p /workspace/settings
        if [ ! -f /workspace/settings/settings.yml ]; then
          cp /repo/src/jarvis/settings.yml /workspace/settings/settings.yml
        fi
        cp -f /repo/utils/settings_gui.html /workspace/settings/settings_gui.html
        for identity_file in /repo/src/jarvis/identities/*.md; do
          target="/workspace/identities/$$(basename "$$identity_file")"
          if [ ! -f "$$target" ]; then
            cp "$$identity_file" "$$target"
          fi
        done
        cp -f /repo/utils/migrate.sh /workspace/migrate.sh
        chmod +x /workspace/migrate.sh
        exec bash
    tty: true
    stdin_open: true

  tool_runtime:
    build:
      context: .
      dockerfile: Dockerfile.tool_runtime
    container_name: jarvis_tool_runtime
    cap_add:
      - SYS_ADMIN
    shm_size: 512m
    security_opt:
      - seccomp:unconfined
    volumes:
      - ${AGENT_ROOT:-${HOME}/.jarvis/workspace}:/workspace
      - tool_runtime_uv_cache:/root/.cache/uv
    environment:
      JARVIS_TOOL_RUNTIME_SERVICE_HOST: 0.0.0.0
      JARVIS_TOOL_RUNTIME_SERVICE_PORT: 8081
    working_dir: /workspace
    command:
      - python
      - -m
      - jarvis.tool_runtime_service
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8081/health", timeout=5)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  uv_cache:
  tool_runtime_uv_cache:

secrets:
  OPENAI_API_KEY:
    file: ./secrets/OPENAI_API_KEY
  ANTHROPIC_API_KEY:
    file: ./secrets/ANTHROPIC_API_KEY
  GOOGLE_API_KEY:
    file: ./secrets/GOOGLE_API_KEY
  XAI_API_KEY:
    file: ./secrets/XAI_API_KEY
  OPENROUTER_API_KEY:
    file: ./secrets/OPENROUTER_API_KEY
  JARVIS_CODEX_WS_BEARER_TOKEN:
    file: ./secrets/JARVIS_CODEX_WS_BEARER_TOKEN
  SENDER_EMAIL_ADDRESS:
    file: ./secrets/SENDER_EMAIL_ADDRESS
  SMTP_PASSWORD:
    file: ./secrets/SMTP_PASSWORD
  TELEGRAM_TOKEN:
    file: ./secrets/TELEGRAM_TOKEN
  JARVIS_UI_TELEGRAM_ALLOWED_USER_ID:
    file: ./secrets/JARVIS_UI_TELEGRAM_ALLOWED_USER_ID
  BRAVE_SEARCH_API_KEY:
    file: ./secrets/BRAVE_SEARCH_API_KEY
  CLOUDFLARE_ACCOUNT_ID:
    file: ./secrets/CLOUDFLARE_ACCOUNT_ID
  CLOUDFLARE_AI_WORKERS_REST_API_KEY:
    file: ./secrets/CLOUDFLARE_AI_WORKERS_REST_API_KEY
