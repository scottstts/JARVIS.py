services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jarvis
    cap_add:
      - SYS_ADMIN
    shm_size: 8gb
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./:/repo
      - ${AGENT_ROOT:-${HOME}/.jarvis/workspace}:/workspace
      - uv_cache:/root/.cache/uv
    working_dir: /repo
    tty: true
    stdin_open: true

  init-identities:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./:/repo
      - ${AGENT_ROOT:-${HOME}/.jarvis/workspace}:/workspace
    working_dir: /repo
    command: >
      bash -lc '
        mkdir -p /workspace/identities &&
        cp -a /repo/src/identities/. /workspace/identities/
      '

volumes:
  uv_cache:
