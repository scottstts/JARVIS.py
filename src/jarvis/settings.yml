    max_active:
      label: "Max Active Subagents"
      description: "Maximum number of concurrent active subagents."
      type: "integer"
      min: 1
      step: 1
      value: 7
    main_context_event_limit:
      label: "Main Context Event Limit"
      description: "How many main-session events get injected into child context."
