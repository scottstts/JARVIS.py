# Jarvis user-facing non-secret runtime settings.

providers:
  title: "Provider Profiles"
  description: "Per-provider model defaults and higher-level generation settings."
  groups:
    openai:
      title: "OpenAI"
      description: "Default model and generation settings for OpenAI."
      fields:
        chat_model:
          label: "Chat Model"
          description: "Default OpenAI chat model name."
          type: "text"
          value: "gpt-5.4-2026-03-05"
        temperature:
          label: "Temperature"
          description: "Sampling temperature for OpenAI responses."
          type: "float"
          min: 0
          step: 0.1
          value: 1
        max_output_tokens:
          label: "Max Output Tokens"
          description: "Maximum output tokens requested from OpenAI."
          type: "integer"
          min: 1
          step: 100
          value: 64000
        reasoning_effort:
          label: "Reasoning Effort"
          description: "Reasoning effort passed to the OpenAI Responses API."
          type: "select"
          options:
            - "none"
            - "minimal"
            - "low"
            - "medium"
            - "high"
            - "xhigh"
          value: "medium"
        reasoning_summary:
          label: "Reasoning Summary"
          description: "Optional OpenAI reasoning summary mode."
          type: "select"
          nullable: true
          options:
            - "auto"
            - "concise"
            - "detailed"
          value: null
        text_verbosity:
          label: "Text Verbosity"
          description: "Optional OpenAI verbosity hint."
          type: "select"
          nullable: true
          options:
            - "low"
            - "medium"
            - "high"
          value: null
    anthropic:
      title: "Anthropic"
      description: "Default model and thinking settings for Anthropic."
      fields:
        chat_model:
          label: "Chat Model"
          description: "Default Anthropic chat model name."
          type: "text"
          value: "claude-sonnet-4-6"
        temperature:
          label: "Temperature"
          description: "Sampling temperature for Anthropic requests."
          type: "float"
          min: 0
          step: 0.1
          value: 1
        max_output_tokens:
          label: "Max Output Tokens"
          description: "Maximum output tokens requested from Anthropic."
          type: "integer"
          min: 1
          step: 100
          value: 32000
        thinking_mode:
          label: "Thinking Mode"
          description: "Anthropic thinking mode hint."
          type: "select"
          options:
            - "adaptive"
            - "enabled"
            - "disabled"
          value: "adaptive"
        effort:
          label: "Effort"
          description: "Anthropic effort hint."
          type: "select"
          options:
            - "minimal"
            - "low"
            - "medium"
            - "high"
          value: "medium"
        thinking_budget_tokens:
          label: "Thinking Budget Tokens"
          description: "Optional explicit Anthropic thinking budget."
          type: "integer"
          nullable: true
          min: 1
          step: 100
          value: null
        prompt_cache_ttl:
          label: "Prompt Cache TTL"
          description: "Optional Anthropic prompt cache TTL."
          type: "select"
          nullable: true
          options:
            - "5m"
            - "1h"
          value: "1h"
    gemini:
      title: "Gemini"
      description: "Default model and thinking settings for Gemini."
      fields:
        chat_model:
          label: "Chat Model"
          description: "Default Gemini chat model name."
          type: "text"
          value: "gemini-3.1-pro-preview"
        temperature:
          label: "Temperature"
          description: "Sampling temperature for Gemini requests."
          type: "float"
          min: 0
          step: 0.1
          value: 1
        max_output_tokens:
          label: "Max Output Tokens"
          description: "Maximum output tokens requested from Gemini."
          type: "integer"
          min: 1
          step: 100
          value: 64000
        thinking_level:
          label: "Thinking Level"
          description: "Gemini thinking level hint."
          type: "select"
          options:
            - "none"
            - "low"
            - "medium"
            - "high"
          value: "medium"
        thinking_budget:
          label: "Thinking Budget"
          description: "Optional Gemini thinking budget."
          type: "integer"
          nullable: true
          min: 1
          step: 100
          value: null
    codex:
      title: "Codex"
      description: "Model defaults for the Codex backend."
      fields:
        model:
          label: "Codex Model"
          description: "Optional default model override for Codex-backed actors."
          type: "text"
          nullable: true
          value: "gpt-5.4"
        reasoning_effort:
          label: "Codex Reasoning Effort"
          description: "Reasoning effort passed to Codex turns."
          type: "select"
          nullable: true
          options:
            - "none"
            - "minimal"
            - "low"
            - "medium"
            - "high"
            - "xhigh"
          value: "medium"
    grok:
      title: "Grok"
      description: "Default model and generation settings for Grok."
      fields:
        chat_model:
          label: "Chat Model"
          description: "Default Grok chat model name."
          type: "text"
          value: "grok-4.20-0309-non-reasoning"
        temperature:
          label: "Temperature"
          description: "Sampling temperature for Grok requests."
          type: "float"
          min: 0
          step: 0.1
          value: 1
        max_output_tokens:
          label: "Max Output Tokens"
          description: "Maximum output tokens requested from Grok."
          type: "integer"
          min: 1
          step: 100
          value: 32000
    openrouter:
      title: "OpenRouter"
      description: "Default model and generation settings for OpenRouter."
      fields:
        chat_model:
          label: "Chat Model"
          description: "Default OpenRouter chat model name."
          type: "text"
          value: "moonshotai/kimi-k2.6"
        temperature:
          label: "Temperature"
          description: "Sampling temperature for OpenRouter requests."
          type: "float"
          min: 0
          step: 0.1
          value: 1
        max_output_tokens:
          label: "Max Output Tokens"
          description: "Maximum output tokens requested from OpenRouter."
          type: "integer"
          min: 1
          step: 100
          value: 32000

main_agent_provider:
  label: "Main Agent Provider"
  description: "Provider used by Jarvis the main-agent."
  type: "select"
  options:
    - "codex"
    - "openai"
    - "anthropic"
    - "gemini"
    - "grok"
    - "openrouter"
    - "lmstudio"
  value: "openai"

subagent_provider:
  label: "Subagent Provider"
  description: "Provider used by subagents."
  type: "select"
  nullable: true
  options:
    - "codex"
    - "openai"
    - "anthropic"
    - "gemini"
    - "grok"
    - "openrouter"
    - "lmstudio"
  value: "openai"

embedding:
  title: "Embeddings"
  description: "Default embedding provider and model."
  fields:
    provider:
      label: "Embedding Provider"
      description: "Provider used for embedding requests."
      type: "select"
      options:
        - "openai"
        - "gemini"
        - "openrouter"
      value: "openai"
    model:
      label: "Embedding Model"
      description: "Embedding model name used across the app."
      type: "text"
      value: "text-embedding-3-small"

core:
  title: "Core Session Policy"
  description: "Conversation budget, timezone, and compaction provider."
  fields:
    context_window_tokens:
      label: "Max Context Length Tokens"
      description: "Maximum context length used for turn budgeting."
      type: "integer"
      min: 1
      step: 1000
      value: 250000
    timezone:
      label: "Core Timezone"
      description: "IANA timezone name used for turn timestamps and memory logic."
      type: "text"
      value: "Europe/Dublin"
  groups:
    compaction:
      title: "Compaction"
      description: "Dedicated provider used for session compaction."
      fields:
        provider:
          label: "Compaction Provider"
          description: "Provider used only for compaction requests."
          type: "select"
          options:
            - "openai"
            - "anthropic"
            - "gemini"
            - "grok"
            - "openrouter"
            - "lmstudio"
          value: "openai"

tools:
  title: "Tools"
  description: "User-facing tool integration settings."
  groups:
    generate_edit_image:
      title: "Generate/Edit Image"
      description: "Model defaults for the generate_edit_image tool."
      fields:
        openai_model:
          label: "OpenAI Image Model"
          description: "OpenAI model used when generate_edit_image runs with provider openai."
          type: "text"
          value: "gpt-image-2"
        gemini_model:
          label: "Gemini Image Model"
          description: "Gemini model used when generate_edit_image runs with provider gemini."
          type: "text"
          value: "gemini-3.1-flash-image-preview"
    email:
      title: "Email"
      description: "SMTP defaults for outbound email."
      fields:
        smtp_host:
          label: "Email SMTP Host"
          description: "Default SMTP server hostname."
          type: "text"
          value: "smtp.gmail.com"
        smtp_port:
          label: "Email SMTP Port"
          description: "Default SMTP server port."
          type: "integer"
          min: 1
          max: 65535
          step: 1
          value: 465
        smtp_security:
          label: "SMTP Security"
          description: "Transport security mode for SMTP connections."
          type: "select"
          options:
            - "ssl"
            - "starttls"
            - "none"
          value: "ssl"

skills:
  title: "Skills"
  description: "Agent skill discovery and startup context behavior."
  fields:
    bootstrap_headers:
      label: "Bootstrap Skill Headers"
      description: "Show installed skill names and descriptions at session start."
      type: "boolean"
      value: false

memory:
  title: "Memory"
  description: "User-facing memory provider and behavior settings."
  groups:
    maintenance:
      title: "Maintenance"
      description: "Provider/model configuration for memory maintenance tasks."
      fields:
        provider:
          label: "Maintenance Provider"
          description: "Provider used for memory maintenance runs."
          type: "select"
          options:
            - "openai"
            - "anthropic"
            - "gemini"
            - "grok"
            - "openrouter"
            - "lmstudio"
          value: "openai"
        model:
          label: "Maintenance Model"
          description: "Model used for memory maintenance."
          type: "text"
          value: "gpt-5.4-2026-03-05"
        max_output_tokens:
          label: "Maintenance Max Output Tokens"
          description: "Maximum output tokens for memory maintenance runs."
          type: "integer"
          min: 1
          step: 100
          value: 5000
    automation:
      title: "Automation"
      description: "Automatic reflection and apply behaviors for memory upkeep."
      fields:
        enable_reflection:
          label: "Enable Reflection"
          description: "Allow the memory system to run reflection passes."
          type: "boolean"
          value: true
        enable_auto_apply_core:
          label: "Auto Apply Core Memories"
          description: "Automatically apply promoted core memories."
          type: "boolean"
          value: true
        enable_auto_apply_ongoing:
          label: "Auto Apply Ongoing Memories"
          description: "Automatically apply promoted ongoing memories."
          type: "boolean"
          value: true
    retrieval:
      title: "Retrieval"
      description: "High-level memory retrieval behavior."
      fields:
        search_default_top_k:
          label: "Search Default Top K"
          description: "Default retrieval result count returned by memory search."
          type: "integer"
          min: 1
          step: 1
          value: 8
        daily_lookback_days:
          label: "Daily Lookback Days"
          description: "How many days of daily memory entries remain actively visible."
          type: "integer"
          min: 1
          step: 1
          value: 30
